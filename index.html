<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Исполнитель желаний — общий чат</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            width: 2px;
            height: 2px;
            opacity: 0;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        .whale-wrapper {
            position: fixed;
            bottom: 5%;
            left: -20%;
            width: 100px;
            z-index: 12;
            pointer-events: none;
            animation: swim 24s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(0, 150, 255, 0.4));
        }
        .whale-svg {
            width: 100%;
            opacity: 0.9;
        }
        @keyframes swim {
            0% { left: -20%; bottom: 5%; transform: scaleX(1);}
            45% { left: 70%; bottom: 12%; transform: scaleX(1);}
            50% { left: 72%; bottom: 12%; transform: scaleX(-1);}
            95% { left: -20%; bottom: 8%; transform: scaleX(-1);}
            100% { left: -20%; bottom: 5%; transform: scaleX(1);}
        }
        .wish-chat {
            position: relative;
            z-index: 10;
            background: rgba(10, 20, 45, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 1.5rem;
            width: 100%;
            max-width: 700px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(66, 153, 225, 0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 500;
            background: linear-gradient(135deg, #C0E0FF, #7CB9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .counter {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 80px;
            padding: 0.4rem 1rem;
            display: inline-block;
            font-size: 0.9rem;
            color: #bbd9ff;
            margin-top: 6px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .wish-item {
            background: rgba(15, 25, 55, 0.6);
            border-radius: 20px;
            padding: 10px 14px;
            color: #eef4ff;
            border-left: 3px solid #2b9aff;
        }
        .wish-text {
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        .wish-meta {
            font-size: 0.65rem;
            color: #8e9eae;
            margin-top: 5px;
            text-align: right;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .wish-input {
            flex: 1;
            background: rgba(15, 25, 55, 0.8);
            border: 1px solid #2c4875;
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 1rem;
            color: white;
            font-family: inherit;
            outline: none;
        }
        .wish-input:focus {
            border-color: #5b9eff;
            box-shadow: 0 0 12px rgba(91, 158, 255, 0.4);
        }
        .send-btn {
            background: linear-gradient(95deg, #2b6ef0, #1a4fcf);
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-btn:hover {
            transform: scale(0.96);
        }
        .empty-chat {
            text-align: center;
            color: #8e9eae;
            padding: 20px;
        }
        footer {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.65rem;
            color: #6c86a3;
        }
        @media (max-width: 600px) {
            .wish-chat { padding: 1rem; height: 85vh; }
            .title { font-size: 1.4rem; }
            .whale-wrapper { width: 70px; }
        }
    </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="whale-wrapper">
    <svg class="whale-svg" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 65 L10 75 L20 85 L45 80 L75 92 L110 95 L145 88 L170 78 L185 68 L190 58 L175 52 L155 55 L130 58 L110 60 L85 58 L60 55 L40 58 L30 65Z" fill="#3B82F6" stroke="#BFDBFE" stroke-width="1.5"/>
        <path d="M30 65 L10 75 L20 85 L45 80 L75 92 L110 95 L145 88 L170 78 L185 68 L190 58 L175 52 L155 55 L130 58 L110 60 L85 58 L60 55 L40 58 L30 65Z" fill="url(#whaleGrad)" opacity="0.8"/>
        <circle cx="162" cy="64" r="4" fill="white"/>
        <circle cx="163" cy="63" r="1.8" fill="#0A1128"/>
        <defs>
            <linearGradient id="whaleGrad" x1="0" y1="0" x2="1" y2="0.2">
                <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.95"/>
                <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.9"/>
            </linearGradient>
        </defs>
    </svg>
</div>

<div class="wish-chat">
    <div class="header">
        <div class="title">✨ Общий чат желаний</div>
        <div class="counter" id="wishCounter">✨ желаний: загрузка...</div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="empty-chat">🐋 Загадай желание — и кит унесёт его в звёзды</div>
    </div>
    <div class="input-area">
        <input type="text" class="wish-input" id="wishInput" placeholder="Напиши своё желание...">
        <button class="send-btn" id="sendBtn">✨ Загадать</button>
    </div>
    <footer>⭐ Анонимно · Мечты сбываются</footer>
</div>

<script>
    (function() {
        const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
        const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Звёзды
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 250; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 2 + 1 + 's';
            starsContainer.appendChild(star);
        }
        
        let currentUser = null;
        
        async function getOrCreateUser() {
            let userId = localStorage.getItem('wish_user_id');
            if (userId) {
                const { data } = await supabase.from('wishes_users').select('*').eq('id', userId).single();
                if (data) {
                    currentUser = data;
                    return;
                }
            }
            const { data, error } = await supabase.from('wishes_users').insert({}).select().single();
            if (data) {
                currentUser = data;
                localStorage.setItem('wish_user_id', data.id);
            }
        }
        
        async function loadWishes() {
            const { data } = await supabase
                .from('wishes')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(100);
            
            const container = document.getElementById('messagesContainer');
            const counterSpan = document.getElementById('wishCounter');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-chat">✨ Пока нет желаний. Будь первым!</div>';
                counterSpan.innerHTML = `✨ желаний: 0`;
                return;
            }
            
            container.innerHTML = data.map(wish => `
                <div class="wish-item">
                    <div class="wish-text">${escapeHtml(wish.text)}</div>
                    <div class="wish-meta">⭐ ${formatTime(wish.created_at)}</div>
                </div>
            `).join('');
            
            counterSpan.innerHTML = `✨ желаний: ${data.length}`;
        }
        
        async function sendWish() {
            const input = document.getElementById('wishInput');
            const text = input.value.trim();
            if (!text) {
                alert("Напиши желание ✨");
                return;
            }
            if (!currentUser) {
                alert("Ошибка: подождите, идёт загрузка...");
                return;
            }
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = "🕯️ Отправляем...";
            const { error } = await supabase.from('wishes').insert({
                user_id: currentUser.id,
                text: text
            });
            btn.disabled = false;
            btn.textContent = "✨ Загадать";
            if (error) {
                console.error(error);
                alert("❌ Ошибка: желание не отправилось. Попробуй ещё раз.");
            } else {
                alert("🐋✨ Желание уплыло к звёздам!");
                input.value = '';
                loadWishes();
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        function formatTime(date) {
            return new Date(date).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendWish);
        document.getElementById('wishInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendWish();
        });
        
        getOrCreateUser().then(() => {
            loadWishes();
            supabase.channel('wishes_channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wishes' }, () => {
                    loadWishes();
                })
                .subscribe();
        });
    })();
</script>
</body>
</html>
